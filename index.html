<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Seating Map</title>

<style>
  body {
    margin: 0;
    font-family: "Montserrat", sans-serif;
    background: #fff7f8;
    color: #333;
  }

  .screen {
    display: none;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  .screen.active {
    display: block;
  }

  h1 {
    font-family: "Playfair Display", serif;
    font-size: 2.2rem;
    color: #b37a8b;
    text-align: center;
    margin-bottom: 20px;
  }

  .button, .back {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 18px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 0.95rem;
  }

  .button {
    background: #d4af37;
    color: #fff;
    margin-right: 10px;
  }

  .back {
    background: #f4d7d7;
    color: #555;
  }

  #search-input {
    width: 100%;
    padding: 10px 12px;
    font-size: 1rem;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-bottom: 10px;
  }

  #search-results {
    list-style: none;
    padding: 0;
    margin: 0;
    border-radius: 8px;
    border: 1px solid #eee;
    max-height: 220px;
    overflow-y: auto;
    background: #fff;
  }

  #search-results li {
    padding: 8px 12px;
    cursor: pointer;
  }

  #search-results li:hover {
    background: #f4d7d7;
  }

  .map-container {
    width: 100%;
    max-width: 1200px;
    margin: 20px auto;
    border-radius: 16px;
    background: #fff;
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    padding: 10px;
    overflow: auto;
  }

  svg {
    width: auto;
    height: auto;
    display: block;
  }

  .highlight {
    fill: #f7c6d0 !important;
    stroke: #d4af37 !important;
    stroke-width: 4 !important;
    filter: drop-shadow(0 0 12px rgba(212,175,55,0.8));
  }

  .table-highlight {
    stroke: #d4af37 !important;
    stroke-width: 4 !important;
    filter: drop-shadow(0 0 14px rgba(212,175,55,0.6));
  }

  #guest-name, #guest-table, #guest-seat {
    font-size: 1.05rem;
    margin: 6px 0;
    text-align: center;
  }
</style>
</head>
<body>

<!-- PAGE 1 — SEARCH -->
<div id="screen-search" class="screen active">
  <h1>Find Your Seat</h1>
  <input id="search-input" type="text" placeholder="Type your name…">
  <ul id="search-results"></ul>
</div>

<!-- PAGE 2 — DETAILS -->
<div id="screen-details" class="screen">
  <h1>Your Seating Details</h1>
  <p id="guest-name"></p>
  <p id="guest-table"></p>
  <p id="guest-seat"></p>

  <div class="button" onclick="goToMap()">Show me my seat</div>
  <div class="back" onclick="goBackToSearch()">← Back to search</div>
</div>

/* ============================
   SEAT PREFIX → TABLE
   ============================ */
const seatPrefixToTable = {
  "seat1": "table1",
  "seat2": "table2",
  "seat3": "table3",
  "seat4": "table4",
  "seat5": "table5",
  "seat6": "table6",
  "seat7": "table7"
};

let selectedGuest = null;

/* ============================
   SCREEN NAVIGATION
   ============================ */
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goBackToSearch() { showScreen("screen-search"); }
function goBackToDetails() { showScreen("screen-details"); }

function goToDetails(guest) {
  selectedGuest = guest;

  const seatId = guest.seat;
  const prefix = seatId.split("-")[0];
  const tableId = seatPrefixToTable[prefix];

  const seatSuffix = seatId.split("-")[1];
  const seatLabel = isNaN(seatSuffix) ? `Seat ${seatSuffix.toUpperCase()}` : `Seat ${seatSuffix}`;
  const tableLabel = `Table ${tableId.replace("table", "")}`;

  document.getElementById("guest-name").textContent = `Name: ${guest.name}`;
  document.getElementById("guest-table").textContent = `Table: ${tableLabel}`;
  document.getElementById("guest-seat").textContent = `Seat: ${seatLabel}`;

  showScreen("screen-details");
}

function goToMap() {
  showScreen("screen-map");
  if (selectedGuest) highlightSeat(selectedGuest.seat);
}

/* ============================
   SEARCH LOGIC
   ============================ */
const searchInput = document.getElementById("search-input");
const searchResults = document.getElementById("search-results");

searchInput.addEventListener("input", () => {
  const query = searchInput.value.trim().toLowerCase();
  searchResults.innerHTML = "";
  if (!query) return;

  const matches = guests.filter(g => g.name.toLowerCase().includes(query));

  matches.forEach(guest => {
    const li = document.createElement("li");
    li.textContent = guest.name;
    li.addEventListener("click", () => goToDetails(guest));
    searchResults.appendChild(li);
  });
});

/* ============================
   HIGHLIGHT SEAT & TABLE
   ============================ */
function highlightSeat(seatId) {
  const svg = document.querySelector(".map-container svg");
  if (!svg) return;

  svg.querySelectorAll("*").forEach(el => {
    el.classList.remove("highlight");
    el.classList.remove("table-highlight");
  });

  const seat = svg.querySelector(`#${seatId}`);
  if (seat) seat.classList.add("highlight");

  const prefix = seatId.split("-")[0];
  const tableId = seatPrefixToTable[prefix];
  const table = svg.querySelector(`#${tableId}`);

  if (table) {
    const shape = table.querySelector("rect, ellipse, circle, path, polygon, polyline") || table;
    shape.classList.add("table-highlight");
    shape.scrollIntoView({ behavior: "smooth", block: "center" });
  }

  if (seat) {
    setTimeout(() => {
      seat.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 600);
  }
}
