<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Seating Map</title>

  <style>
    html { font-size: 20px; }
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #fafafa;
      color: #333;
      font-size: 1rem;
    }

    h1 {
      text-align: center;
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #d4af37;
    }

    #guest-search {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    #suggestions {
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: white;
      display: none;
      font-size: 1rem;
      max-height: 300px;
      overflow-y: auto;
    }

    .suggestion-item {
      padding: 14px;
      border-bottom: 1px solid #eee;
    }

    .suggestion-item:hover {
      background: #f0f0f0;
      cursor: pointer;
    }

    .section-title {
      font-size: 1.3rem;
      margin-top: 20px;
      margin-bottom: 10px;
      color: #d4af37;
      font-weight: bold;
    }

    .back {
      margin-top: 20px;
      font-size: 1rem;
      color: #d4af37;
      cursor: pointer;
      display: inline-block;
    }

    .map-container {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(212,175,55,0.15);
      overflow: scroll;
      width: 100%;
      height: 80vh;
      margin-top: 20px;
    }

    .highlight {
      fill: #f7c6d0 !important;
      stroke: #d4af37 !important;
      stroke-width: 4 !important;
      filter: drop-shadow(0 0 12px rgba(212,175,55,0.8));
    }
  </style>
</head>

<body>

  <h1>Wedding Seating Map</h1>

  <input id="guest-search" type="text" placeholder="Search guest name…">
  <div id="suggestions"></div>

  <div id="find-seat-section">
    <div class="section-title">Find Your Seat</div>
    <p>Search your name above to find your seat.</p>
  </div>

  <div id="details-section" style="display:none;">
    <div class="section-title">Your Seating Details</div>
    <div id="details-content"></div>
    <div class="back" onclick="goBackToSearch()">← Back to search</div>
  </div>

  <div id="map-section" style="display:none;">
    <div class="section-title">Your Seat on the Map</div>

    <!-- ⭐ SVG LOADED EXTERNALLY (NO CORRUPTION) ⭐ -->
    <div class="map-container">
      <object id="svgMap" type="image/svg+xml" data="map.svg"></object>
    </div>

    <div class="back" onclick="goBackToDetails()">← Back to details</div>
  </div>

  <script>
    /* ⭐ SEAT → TABLE MAP ⭐ */
    const seatToTable = {
      "seat1-1": "table1","seat1-2": "table1","seat1-3": "table1","seat1-4": "table1","seat1-5": "table1","seat1-6": "table1","seat1-7": "table1","seat1-8": "table1",
      "seat2-1": "table2","seat2-2": "table2","seat2-3": "table2","seat2-4": "table2","seat2-5": "table2","seat2-6": "table2","seat2-7": "table2","seat2-8": "table2",
      "seat3-a": "table3","seat3-b": "table3","seat3-c": "table3","seat3-d": "table3","seat3-e": "table3","seat3-f": "table3","seat3-g": "table3","seat3-h": "table3",
      "seat3-i": "table3","seat3-j": "table3","seat3-k": "table3","seat3-l": "table3","seat3-m": "table3","seat3-n": "table3","seat3-o": "table3","seat3-p": "table3",
      "seat4-1": "table4","seat4-2": "table4","seat4-3": "table4",
      "seat5-1": "table5","seat5-2": "table5","seat5-3": "table5","seat5-4": "table5","seat5-5": "table5","seat5-6": "table5","seat5-7": "table5","seat5-8": "table5","seat5-9": "table5","seat5-10": "table5",
      "seat6-1": "table6","seat6-2": "table6","seat6-3": "table6","seat6-4": "table6","seat6-5": "table6","seat6-6": "table6","seat6-7": "table6","seat6-8": "table6","seat6-9": "table6",
      "seat7-1": "table7","seat7-2": "table7","seat7-3": "table7","seat7-4": "table7","seat7-5": "table7","seat7-6": "table7","seat7-7": "table7","seat7-8": "table7","seat7-9": "table7","seat7-10": "table7"
    };

    /* ⭐ FULL GUEST LIST ⭐ */
    const guests = [
      { name: "Angela Evangelista", seat: "seat1-2" },
      { name: "Mark Evangelista", seat: "seat1-3" },
      { name: "Melchiah Evangelista", seat: "seat1-4" },
      { name: "Ethan Elchico", seat: "seat1-5" },
      { name: "Ezekiel Plana", seat: "seat1-6" },
      { name: "Ethan Plana", seat: "seat1-7" },
      { name: "Johanna Plana", seat: "seat1-8" },
      { name: "Aimee Sofocado", seat: "seat1-1" },

      { name: "Daisy Esturas", seat: "seat2-2" },
      { name: "Bernard Esturas", seat: "seat2-3" },
      { name: "Lucia Esturas", seat: "seat2-4" },
      { name: "Lucas Esturas", seat: "seat2-5" },
      { name: "Eloise Plana", seat: "seat2-6" },
      { name: "Erin Plana", seat: "seat2-7" },
      { name: "Nicole Plana", seat: "seat2-8" },
      { name: "Jerich Plana", seat: "seat2-1" },

      { name: "Nathan Osorio", seat: "seat6-1" },
      { name: "Sarah Osorio", seat: "seat6-2" },
      { name: "Therese Empestan", seat: "seat6-3" },
      { name: "Analiza Villarino", seat: "seat6-4" },
      { name: "Richard Villarino", seat: "seat6-5" },
      { name: "Angelo Ayaman", seat: "seat6-6" },
      { name: "Jackie Ayaman", seat: "seat6-7" },
      { name: "Iza Almanza", seat: "seat6-8" },
      { name: "Ace Almanza", seat: "seat6-9" },

      { name: "Ivan Robles", seat: "seat5-1" },
      { name: "Molly Robles", seat: "seat5-2" },
      { name: "Cia Gopez", seat: "seat5-3" },
      { name: "Keanu Robles", seat: "seat5-4" },
      { name: "Gabriel Robles", seat: "seat5-5" },
      { name: "Jonas Robles", seat: "seat5-6" },
      { name: "Jay-Bee Alsaybar", seat: "seat5-7" },
      { name: "Princess Alsaybar", seat: "seat5-8" },
      { name: "Ken-Vee Hopcraft", seat: "seat5-9" },
      { name: "Calvin Hopcraft", seat: "seat5-10" },

      { name: "Brix Viguilla", seat: "seat7-1" },
      { name: "Lavinia Sabado", seat: "seat7-2" },
      { name: "Rolando Sabado", seat: "seat7-3" },
      { name: "Paolo Pineda", seat: "seat7-4" },
      { name: "Joy Demate", seat: "seat7-5" },
      { name: "Oluwaleke Ayeni", seat: "seat7-6" },
      { name: "Adrielle Ayeni", seat: "seat7-7" },
      { name: "Eunice Legaspi", seat: "seat7-8" },
      { name: "Aldrin Legaspi", seat: "seat7-9" },
      { name: "Silver Abuyan", seat: "seat7-10" },

      { name: "Van Robles", seat: "seat4-1" },
      { name: "Makayla Robles", seat: "seat4-2" },
      { name: "Shelah Robles", seat: "seat4-3" },

      { name: "Christopher Picondo", seat: "seat3-a" },
      { name: "Mervin Gasco", seat: "seat3-b" },
      { name: "Aileen Gasco", seat: "seat3-c" },
      { name: "Rodelito Aguila", seat: "seat3-d" },
      { name: "Sherlyn Aguila", seat: "seat3-e" },
      { name: "Leah Robles", seat: "seat3-f" },
      { name: "Martin Robles", seat: "seat3-g" },
      { name: "Lysa Elchico", seat: "seat3-h" },
      { name: "Rogelio Alsaybar", seat: "seat3-i" },
      { name: "Lilian Alsaybar", seat: "seat3-j" },
      { name: "Rose Lyn Flores", seat: "seat3-k" },
      { name: "Michelle Chapman", seat: "seat3-l" },
      { name: "John Chapman", seat: "seat3-m" },
      { name: "Andrew Fenton", seat: "seat3-n" },
      { name: "Dorrean Fenton", seat: "seat3-o" },
      { name: "Pamela Picondo", seat: "seat3-p" }
    ];

    const searchInput = document.getElementById("guest-search");
    const suggestionsBox = document.getElementById("suggestions");

    searchInput.addEventListener("input", function () {
      let query = this.value.toLowerCase().trim();

      if (query.length < 2) {
        suggestionsBox.style.display = "none";
        return;
      }

      const matches = guests.filter(g =>
        g.name.toLowerCase().includes(query)
      );

      if (matches.length === 0) {
        suggestionsBox.style.display = "none";
        return;
      }

      suggestionsBox.innerHTML = matches
        .map(m => `<div class="suggestion-item" data-seat="${m.seat}">
                     ${m.name}
                   </div>`)
        .join("");

      suggestionsBox.style.display = "block";
    });

    suggestionsBox.addEventListener("click", function (e) {
      if (e.target.classList.contains("suggestion-item")) {
        const seatId = e.target.getAttribute("data-seat");
        const name = e.target.innerText;

        searchInput.value = name;
        suggestionsBox.style.display = "none";

        showDetails(name, seatId);
      }
    });

    function showDetails(name, seatId) {
      document.getElementById("find-seat-section").style.display = "none";
      document.getElementById("details-section").style.display = "block";

      const table = seatToTable[seatId] || "Unknown";

      document.getElementById("details-content").innerHTML = `
        <p><strong>Name:</strong> ${name}</p>
        <p><strong>Seat:</strong> ${seatId}</p>
        <p><strong>Table:</strong> ${table}</p>
        <button onclick="showMap('${seatId}')">Show me my seat</button>
      `;
    }

    function showMap(seatId) {
      document.getElementById("details-section").style.display = "none";
      document.getElementById("map-section").style.display = "block";
      highlightSeat(seatId);
    }

    function goBackToSearch() {
      document.getElementById("details-section").style.display = "none";
      document.getElementById("find-seat-section").style.display = "block";
    }

    function goBackToDetails() {
      document.getElementById("map-section").style.display = "none";
      document.getElementById("details-section").style.display = "block";
    }

    /* ⭐ HIGHLIGHT FIX — WAIT FOR SVG TO LOAD ⭐ */
    function highlightSeat(seatId) {
      const svgObject = document.getElementById("svgMap");
      const svgDoc = svgObject.contentDocument;

      if (!svgDoc) {
        setTimeout(() => highlightSeat(seatId), 100);
        return;
      }

      svgDoc.querySelectorAll("ellipse, circle, rect").forEach(el => {
        el.classList.remove("highlight");
      });

      const seat = svgDoc.getElementById(seatId);
      if (seat) {
        seat.classList.add("highlight");
        seat.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    }
  </script>

</body>
</html>
